name: readyroom_mobile
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.4.6

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/icon/app_icon.png
  min_sdk_android: 21

flutter_native_splash:
  color: "#ffffff"
  image: assets/icon/splash_logo.png
  android: true
  ios: true
  android_12:
    color: "#ffffff"
    image: assets/icon/splash_logo.png

flutter:
  uses-material-design: true

  assets:
    - assets/readyroom.png
    - assets/destinasi_bali.jpg
    - assets/photo_jakarta.jpg
    - assets/tebing-breksi.jpg
    - assets/destinasi_jogj.png
    - assets/destinasi aceh.jpg
    - assets/1.jpeg
    - assets/icon/app_icon.png
    - assets/icon/splash_logo.png